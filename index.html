<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Femina Adventure — Tirage au sort</title>
<style>
  :root { --pink:#D81B7E; --blue:#1B3A6B; --gold:#F5C842; --bg:#0D1B35; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); min-height:100vh; font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; color:white; display:flex; flex-direction:column; align-items:center; overflow-x:hidden; }

  .header { width:100%; background:var(--blue); padding:12px 20px; display:flex; align-items:center; gap:14px; border-bottom:3px solid var(--pink); }
  .header img { width:52px; height:52px; border-radius:50%; flex-shrink:0; }
  .header h1  { font-size:17px; font-weight:900; text-transform:uppercase; letter-spacing:1px; }
  .header p   { font-size:11px; color:rgba(255,255,255,0.55); letter-spacing:1.5px; margin-top:3px; }

  .status-bar { width:100%; max-width:460px; margin:14px auto 0; padding:0 16px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .badge { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14); border-radius:20px; padding:7px 14px; font-size:13px; font-weight:600; white-space:nowrap; }
  .badge b { color:var(--pink); }
  .badge-date { background:var(--pink); border-radius:20px; padding:7px 14px; font-size:12px; font-weight:700; white-space:nowrap; }
  .btn-refresh { flex-shrink:0; background:none; border:1px solid rgba(255,255,255,0.25); color:white; border-radius:20px; padding:7px 14px; font-size:13px; cursor:pointer; }
  .btn-refresh:active { opacity:.7; }

  .wheel-wrap { position:relative; width:min(90vw,380px); height:min(90vw,380px); margin:18px auto 0; }
  #wCanvas { width:100%; height:100%; filter:drop-shadow(0 0 22px rgba(216,27,126,0.5)); }
  .ptr { position:absolute; top:50%; right:-18px; transform:translateY(-50%); width:0; height:0; border-top:17px solid transparent; border-bottom:17px solid transparent; border-right:34px solid var(--gold); filter:drop-shadow(0 0 6px var(--gold)); z-index:5; }

  .btn-spin { display:block; margin:20px auto 0; width:min(90vw,340px); padding:18px; background:linear-gradient(135deg,var(--pink),#A0155E); border:none; border-radius:50px; color:white; font-size:18px; font-weight:900; letter-spacing:2px; text-transform:uppercase; cursor:pointer; box-shadow:0 8px 28px rgba(216,27,126,0.5); transition:transform .1s; }
  .btn-spin:active  { transform:scale(.97); }
  .btn-spin:disabled { opacity:.45; cursor:not-allowed; transform:none; }

  .btn-rec { display:block; margin:10px auto 0; width:min(90vw,340px); padding:13px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.2); border-radius:30px; color:white; font-size:13px; font-weight:700; cursor:pointer; text-align:center; }
  .btn-rec.on { background:rgba(220,50,50,0.3); border-color:#ff4444; animation:pulse-rec 1s infinite; }
  @keyframes pulse-rec { 0%,100% { box-shadow:0 0 0 0 rgba(255,68,68,0.4); } 50% { box-shadow:0 0 0 8px rgba(255,68,68,0); } }

  .state { text-align:center; padding:36px 20px; color:rgba(255,255,255,0.45); font-size:14px; line-height:1.75; }
  .state .icon { font-size:50px; margin-bottom:12px; }
  .state.err { color:#ff8a80; }
  .spinner { width:36px; height:36px; margin:0 auto 14px; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--pink); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:100; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
  .overlay.show { display:flex; }
  .winner-card { background:linear-gradient(145deg,#1B3A6B,#0D1B35); border:3px solid var(--pink); border-radius:24px; padding:36px 28px; text-align:center; max-width:340px; width:100%; box-shadow:0 0 60px rgba(216,27,126,0.5); animation:pop .45s cubic-bezier(.175,.885,.32,1.275); }
  @keyframes pop { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
  .w-trophy  { font-size:60px; margin-bottom:10px; }
  .w-label   { font-size:11px; font-weight:800; letter-spacing:3px; color:var(--pink); text-transform:uppercase; margin-bottom:8px; }
  .w-name    { font-size:30px; font-weight:900; line-height:1.2; margin-bottom:6px; }
  .w-detail  { font-size:13px; color:rgba(255,255,255,0.55); margin-bottom:24px; }
  .w-close   { width:100%; padding:14px; background:var(--pink); border:none; border-radius:30px; color:white; font-size:15px; font-weight:800; cursor:pointer; }

  .conf { position:fixed; pointer-events:none; z-index:200; animation:fall linear forwards; }
  @keyframes fall { 0% { transform:translateY(-20px) rotate(0deg); opacity:1; } 100% { transform:translateY(100vh) rotate(720deg); opacity:0; } }

  .footer { margin:16px auto 28px; font-size:11px; color:rgba(255,255,255,0.22); text-align:center; padding:0 20px; line-height:1.6; }
</style>
</head>
<body>

<div class="header">
  <img id="headerLogo" alt="Femina Adventure">
  <div>
    <h1>Tirage au sort</h1>
    <p>FEMINA ADVENTURE &middot; JEU CONCOURS</p>
  </div>
</div>

<div class="status-bar">
  <div class="badge">Participantes&nbsp;: <b id="cnt">&#8212;</b></div>
  <div class="badge-date" id="dateEl"></div>
  <button class="btn-refresh" onclick="loadData()">&#8635; Sync</button>
</div>

<div id="stateEl" class="state">
  <div class="spinner"></div>
  Chargement des participantes...
</div>

<div id="wheelWrap" style="display:none">
  <div class="wheel-wrap">
    <canvas id="wCanvas" width="760" height="760"></canvas>
    <div class="ptr"></div>
  </div>
  <button class="btn-spin" id="btnSpin" onclick="spin()">&#127920;&nbsp; Lancer la roue</button>
  <button class="btn-rec"  id="btnRec"  onclick="toggleRec()">&#9210;&nbsp; Enregistrer la vid&eacute;o</button>
</div>

<div class="overlay" id="overlay">
  <div class="winner-card">
    <div class="w-trophy">&#127942;</div>
    <div class="w-label">Gagnante du jour !</div>
    <div class="w-name"   id="wName"></div>
    <div class="w-detail" id="wDetail"></div>
    <button class="w-close" onclick="closeWinner()">&#10024;&nbsp; F&eacute;licitations !</button>
  </div>
</div>

<p class="footer">Synchronisation automatique toutes les 60&thinsp;s &middot; Seules les inscriptions du jour participent au tirage</p>

var parts      = [];
var isSpinning = false;
var angle      = 0;
var recorder   = null;

/* ── Date ───────────────────────────────────────────── */
var now = new Date();
document.getElementById("dateEl").textContent =
  now.toLocaleDateString("fr-FR", {day:"2-digit", month:"long", year:"numeric"});
var todayPrefix = [
  String(now.getDate()).padStart(2,"0"),
  String(now.getMonth()+1).padStart(2,"0"),
  now.getFullYear()
].join("/");

/* Logo */
var logoImg = new Image();
logoImg.src = "data:image/png;base64," + LOGO_B64;
logoImg.onload = function() { if (parts.length) drawWheel(angle); };
document.getElementById("headerLogo").src = logoImg.src;

/* ── CSV parser ─────────────────────────────────────── */
function splitLine(line) {
  var r=[], cur="", q=false;
  for (var i=0; i<line.length; i++) {
    var c = line[i];
    if (c==='"') { q=!q; continue; }
    if (c==="," && !q) { r.push(cur); cur=""; continue; }
    cur += c;
  }
  r.push(cur);
  return r;
}

function parseCSV(txt) {
  var lines = txt.trim().split("
");
  var out   = [];
  for (var i=1; i<lines.length; i++) {
    var cols   = splitLine(lines[i]);
    var horo   = (cols[0]||"").replace(/"/g,"").trim();
    if (!horo.startsWith(todayPrefix)) continue;
    var nom    = (cols[1]||"").replace(/"/g,"").trim();
    var prenom = (cols[2]||"").replace(/"/g,"").trim();
    var email  = (cols[3]||"").replace(/"/g,"").trim();
    var tel    = (cols[5]||"").replace(/"/g,"").trim();
    if (!nom && !prenom) continue;
    out.push({nom:nom, prenom:prenom, email:email, tel:tel});
  }
  return out;
}

/* ── Load ───────────────────────────────────────────── */
function loadData() {
  document.getElementById("stateEl").style.display = "block";
  document.getElementById("stateEl").className     = "state";
  document.getElementById("stateEl").innerHTML     = "<div class=\"spinner\"></div>Chargement...";
  document.getElementById("cnt").textContent       = "—";
  document.getElementById("wheelWrap").style.display = "none";

  fetch(CSV_URL + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(function(txt) {
      parts = parseCSV(txt);
      document.getElementById("cnt").textContent = parts.length;
      if (parts.length === 0) {
        document.getElementById("stateEl").innerHTML =
          "<div class=\"icon\">&#127919;</div>Aucune inscription ce jour.<br>La roue se mettra a jour automatiquement.";
      } else {
        document.getElementById("stateEl").style.display = "none";
        document.getElementById("wheelWrap").style.display = "block";
        drawWheel(angle);
      }
    })
    .catch(function(e) {
      document.getElementById("stateEl").className = "state err";
      document.getElementById("stateEl").innerHTML =
        "<div class=\"icon\">&#9888;</div>Erreur de chargement<br><small>" + e.message + "</small>";
      console.error(e);
    });
}

/* ── Canvas ─────────────────────────────────────────── */
var cv  = document.getElementById("wCanvas");
var ctx = cv.getContext("2d");
var SZ=760, CX=380, CY=380, R=368;

function drawWheel(a) {
  if (!parts.length) return;
  ctx.clearRect(0,0,SZ,SZ);
  var arc = 2*Math.PI / parts.length;

  for (var i=0; i<parts.length; i++) {
    var a0=a+i*arc, a1=a0+arc;
    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,R,a0,a1); ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.12)";
    ctx.lineWidth = 1.5; ctx.stroke();

    ctx.save(); ctx.translate(CX,CY); ctx.rotate(a0+arc/2);
    var lim = parts.length<=10 ? 14 : parts.length<=20 ? 10 : 7;
    var fs  = parts.length<=8  ? 22 : parts.length<=16 ? 17 : parts.length<=30 ? 13 : 10;
    var lbl = (parts[i].prenom+" "+parts[i].nom).slice(0,lim);
    ctx.font = "bold "+fs+"px -apple-system,Arial,sans-serif";
    ctx.textAlign="right"; ctx.fillStyle="white";
    ctx.shadowColor="rgba(0,0,0,0.6)"; ctx.shadowBlur=3;
    ctx.fillText(lbl, R-14, fs/3);
    ctx.restore();
  }

  ctx.beginPath(); ctx.arc(CX,CY,74,0,2*Math.PI);
  ctx.fillStyle="#0D1B35"; ctx.fill();
  ctx.strokeStyle="#D81B7E"; ctx.lineWidth=4.5; ctx.stroke();

  if (logoImg.complete && logoImg.naturalWidth) {
    ctx.save(); ctx.beginPath(); ctx.arc(CX,CY,68,0,2*Math.PI); ctx.clip();
    ctx.drawImage(logoImg,CX-68,CY-68,136,136); ctx.restore();
  }

  ctx.beginPath(); ctx.arc(CX,CY,R,0,2*Math.PI);
  ctx.strokeStyle="#D81B7E"; ctx.lineWidth=6; ctx.stroke();
}

/* ── Spin ───────────────────────────────────────────── */
function spin() {
  if (isSpinning || !parts.length) return;
  isSpinning = true;
  document.getElementById("btnSpin").disabled = true;

  var tours  = 7 + Math.random()*5;
  var target = angle + tours*2*Math.PI;
  var dur    = 4500 + Math.random()*2000;
  var t0     = performance.now();
  var from   = angle;

  function ease(t) { return 1 - Math.pow(1-t, 4); }

  function frame(now) {
    var t = Math.min((now-t0)/dur, 1);
    angle = from + (target-from)*ease(t);
    drawWheel(angle);
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      angle = ((angle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      isSpinning = false;
      document.getElementById("btnSpin").disabled = false;
      showWinner();
    }
  }
  requestAnimationFrame(frame);
}

/* ── Winner ─────────────────────────────────────────── */
function showWinner() {
  var arc = 2*Math.PI/parts.length;
  var idx = Math.floor(((2*Math.PI-angle)%(2*Math.PI))/arc) % parts.length;
  var w   = parts[idx];
  document.getElementById("wName").textContent   = w.prenom+" "+w.nom;
  document.getElementById("wDetail").textContent = w.email || w.tel || "";
  document.getElementById("overlay").classList.add("show");
  launchConfetti();
}

function closeWinner() {
  document.getElementById("overlay").classList.remove("show");
}

function launchConfetti() {
  var C=["#D81B7E","#F5C842","#FFF","#42A5F5","#E83A95","#FFD700","#1B3A6B"];
  for (var i=0; i<90; i++) {
    var el = document.createElement("div");
    el.className = "conf";
    var s = 6+Math.random()*8;
    el.style.cssText = "left:"+Math.random()*100+"vw;top:-12px;width:"+s+"px;height:"+s+"px;background:"+C[i%C.length]+";border-radius:"+(Math.random()>.5?"50%":"2px")+";animation-duration:"+(2+Math.random()*3)+"s;animation-delay:"+(Math.random()*.6)+"s";
    document.body.appendChild(el);
    el.addEventListener("animationend", function() { this.remove(); });
  }
}

/* ── Recording ──────────────────────────────────────── */
function toggleRec() {
  var btn = document.getElementById("btnRec");
  if (!recOn) {
    capStream = cv.captureStream(30);
    chunks = [];
    var mimes = ["video/webm;codecs=vp9","video/webm","video/mp4"];
    var mime = "";
    for (var i=0; i<mimes.length; i++) {
      if (MediaRecorder.isTypeSupported(mimes[i])) { mime=mimes[i]; break; }
    }
    recorder = new MediaRecorder(capStream, mime ? {mimeType:mime} : {});
    recorder.ondataavailable = function(e) { if (e.data.size>0) chunks.push(e.data); };
    recorder.onstop = function() {
      var blob = new Blob(chunks, {type: chunks[0] ? chunks[0].type : "video/webm"});
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement("a");
      a.href   = url;
      a.download = "femina-tirage-"+now.toISOString().slice(0,10)+".webm";
      a.click();
      URL.revokeObjectURL(url);
    };
    recorder.start(100);
    recOn = true;
    btn.textContent = "⏹  Arrêter et télécharger";
    btn.classList.add("on");
  } else {
    recorder.stop();
    capStream.getTracks().forEach(function(t){t.stop();});
    recOn = false;
    btn.textContent = "⏺  Enregistrer la vidéo";
    btn.classList.remove("on");
  }
}

/* ── Init ───────────────────────────────────────────── */
loadData();
setInterval(loadData, 60000);
</script>
