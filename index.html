<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Femina Adventure &#8212; Tirage au sort</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#050D1A;overflow:hidden;display:flex;flex-direction:column;align-items:center;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;color:#fff}
#stage{position:relative;flex-shrink:0}
#c{display:block}
#ui{width:100%;max-width:400px;padding:8px 16px 16px;display:none;flex-direction:column;gap:8px;flex-shrink:0}
.btn-row{display:flex;gap:10px}
.btn-spin{flex:2;padding:14px;background:linear-gradient(135deg,#D81B7E,#6B0038);border:none;border-radius:40px;color:#fff;font-size:15px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;box-shadow:0 6px 28px rgba(216,27,126,.6);transition:transform .1s}
.btn-spin:active{transform:scale(.97)}
.btn-spin:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-rec{flex:1;padding:14px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.25);border-radius:40px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;text-align:center;line-height:1.3}
.btn-rec.on{background:rgba(220,40,40,.35);border-color:#f44;animation:pr 1s infinite}
@keyframes pr{0%,100%{box-shadow:0 0 0 0 rgba(255,68,68,.5)}50%{box-shadow:0 0 0 10px rgba(255,68,68,0)}}
.stat-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600}
.badge b{color:#D81B7E}
.badge-d{background:#D81B7E;border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700}
.btn-ref{background:none;border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:20px;padding:5px 10px;font-size:13px;cursor:pointer}
#stateEl{text-align:center;padding:30px 20px;color:rgba(255,255,255,.5);font-size:14px;line-height:1.8;width:100%}
.spinner{width:36px;height:36px;margin:0 auto 12px;border:3px solid rgba(255,255,255,.1);border-top-color:#D81B7E;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.conf{position:fixed;pointer-events:none;z-index:999;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div id="stateEl"><div class="spinner"></div>Chargement...</div>
<div id="stage" style="display:none"><canvas id="c"></canvas></div>
<div id="ui">
  <div class="stat-row">
    <div class="badge">Participantes&nbsp;: <b id="cnt">&#8212;</b></div>
    <div class="badge-d" id="dateEl"></div>
    <button class="btn-ref" onclick="loadData()">&#8635;</button>
  </div>
  <div class="btn-row">
    <button class="btn-spin" id="btnSpin" onclick="spin()">&#127920; Lancer la roue</button>
    <button class="btn-rec"  id="btnRec"  onclick="toggleRec()">&#9210; REC</button>
  </div>
</div>

var CW=1080,CH=1920;
function fitCanvas(){
  var vw=window.innerWidth,vh=window.innerHeight;
  var scale=Math.min(vw/CW,(vh-100)/CH);
  var stage=document.getElementById('stage');
  stage.style.width=Math.round(CW*scale)+'px';
  stage.style.height=Math.round(CH*scale)+'px';
  var c=document.getElementById('c');
  c.style.width=CW+'px';c.style.height=CH+'px';
  c.style.transform='scale('+scale+')';
  c.style.transformOrigin='top left';
}
window.addEventListener('resize',fitCanvas);

function splitCSV(line){

  for(var i=0;i<line.length;i++){var c=line[i];if(c==='"'){q=!q;continue;}if(c===','&&!q){r.push(cur);cur='';continue;}cur+=c;}

function parseCSV(txt){

  for(var i=1;i<lines.length;i++){

    var prenom=stripQ(cols[2]||'').trim(),nom=stripQ(cols[1]||'').trim();

function makeGlowTex(hex){

}

function spin(){
  if(isSpinning||!parts.length||!wheelGroup)return;
  if(winnerCard){scene.remove(winnerCard);winnerCard=null;}
  isSpinning=true;document.getElementById('btnSpin').disabled=true;
  var tours=8+Math.random()*5,target=wheelAngle+tours*2*Math.PI;
  var dur=5000+Math.random()*2000,t0=performance.now(),from=wheelAngle;
  function ease(t){return 1-Math.pow(1-t,4);}
  function frame(ts){
    var t=Math.min((ts-t0)/dur,1);
    wheelAngle=from+(target-from)*ease(t);
    if(wheelGroup)wheelGroup.rotation.z=wheelAngle;
    for(var i=0;i<labelSprites.length;i++){var ls=labelSprites[i],wa=ls.baseAngle+wheelAngle;ls.sprite.position.set(Math.cos(wa)*ls.r,Math.sin(wa)*ls.r,37);}
    if(t<1){requestAnimationFrame(frame);}
    else{
      wheelAngle=((wheelAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      if(wheelGroup)wheelGroup.rotation.z=wheelAngle;
      isSpinning=false;document.getElementById('btnSpin').disabled=false;
      var arc2=2*Math.PI/parts.length;
      var a=((2*Math.PI-wheelAngle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
      winnerIdx=Math.floor(a/arc2)%parts.length;
      buildWinnerCard(parts[winnerIdx]);launchConfetti();
    }
  }
  requestAnimationFrame(frame);
}
function toggleRec(){
  var btn=document.getElementById('btnRec');

    capStream=canvas.captureStream(30);chunks=[];
    var mimes=['video/webm;codecs=vp9','video/webm','video/mp4'],mime='';
    for(var i=0;i<mimes.length;i++){if(typeof MediaRecorder!=='undefined'&&MediaRecorder.isTypeSupported(mimes[i])){mime=mimes[i];break;}}
    recorder=new MediaRecorder(capStream,mime?{mimeType:mime,videoBitsPerSecond:8000000}:{videoBitsPerSecond:8000000});
    recorder.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
    recorder.onstop=function(){var blob=new Blob(chunks,{type:chunks[0]?chunks[0].type:'video/webm'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='femina-story-'+now.toISOString().slice(0,10)+'.webm';a.click();URL.revokeObjectURL(url);};
    recorder.start(100);recOn=true;btn.textContent='\u23F9 STOP';btn.classList.add('on');
  }else{

    recOn=false;btn.textContent='\u23FA REC';btn.classList.remove('on');
  }
}
