<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Femina Adventure — Tirage au sort</title>
<style>
  :root { --pink:#D81B7E; --blue:#1B3A6B; --gold:#F5C842; --bg:#0D1B35; }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:var(--bg);
    min-height:100vh;
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
  }

  /* Header */
  .header {
    width:100%; background:var(--blue);
    padding:12px 20px;
    display:flex; align-items:center; gap:14px;
    border-bottom:3px solid var(--pink);
    flex-shrink:0;
  }
  .header img { width:52px; height:52px; border-radius:50%; flex-shrink:0; }
  .header h1  { font-size:17px; font-weight:900; text-transform:uppercase; letter-spacing:1px; line-height:1.2; }
  .header p   { font-size:11px; color:rgba(255,255,255,0.55); letter-spacing:1.5px; margin-top:3px; }

  /* Status bar */
  .status-bar {
    width:100%; max-width:460px;
    margin:14px auto 0; padding:0 16px;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .badge {
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:20px; padding:7px 14px;
    font-size:13px; font-weight:600; white-space:nowrap;
  }
  .badge b { color:var(--pink); }
  .badge-date {
    background:var(--pink); border-radius:20px;
    padding:7px 14px; font-size:12px; font-weight:700; white-space:nowrap;
  }
  .btn-refresh {
    flex-shrink:0;
    background:none; border:1px solid rgba(255,255,255,0.25);
    color:white; border-radius:20px; padding:7px 14px;
    font-size:13px; cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-refresh:active { opacity:.7; }

  /* Wheel */
  .wheel-wrap {
    position:relative;
    width:min(90vw,380px); height:min(90vw,380px);
    margin:18px auto 0;
  }
  #wCanvas { width:100%; height:100%; filter:drop-shadow(0 0 22px rgba(216,27,126,0.5)); }
  .ptr {
    position:absolute; top:50%; right:-18px;
    transform:translateY(-50%);
    width:0; height:0;
    border-top:17px solid transparent;
    border-bottom:17px solid transparent;
    border-right:34px solid var(--gold);
    filter:drop-shadow(0 0 6px var(--gold));
    z-index:5;
  }

  /* Buttons */
  .btn-spin {
    display:block; margin:20px auto 0;
    width:min(90vw,340px); padding:18px;
    background:linear-gradient(135deg,var(--pink),#A0155E);
    border:none; border-radius:50px; color:white;
    font-size:18px; font-weight:900; letter-spacing:2px;
    text-transform:uppercase; cursor:pointer;
    box-shadow:0 8px 28px rgba(216,27,126,0.5);
    -webkit-tap-highlight-color:transparent;
    transition:transform .1s, box-shadow .1s;
  }
  .btn-spin:active  { transform:scale(.97); box-shadow:0 4px 14px rgba(216,27,126,0.4); }
  .btn-spin:disabled { opacity:.45; cursor:not-allowed; transform:none; }

  .btn-rec {
    display:block; margin:10px auto 0;
    width:min(90vw,340px); padding:13px;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:30px; color:white;
    font-size:13px; font-weight:700; cursor:pointer;
    text-align:center;
    -webkit-tap-highlight-color:transparent;
    transition:background .2s, border-color .2s;
  }
  .btn-rec.on {
    background:rgba(220,50,50,0.3);
    border-color:#ff4444;
    animation:pulse-rec 1s infinite;
  }
  @keyframes pulse-rec {
    0%,100% { box-shadow:0 0 0 0 rgba(255,68,68,0.4); }
    50%      { box-shadow:0 0 0 8px rgba(255,68,68,0); }
  }

  /* States */
  .state {
    text-align:center; padding:36px 20px;
    color:rgba(255,255,255,0.45); font-size:14px; line-height:1.75;
  }
  .state .icon { font-size:50px; margin-bottom:12px; }
  .state.err { color:#ff8a80; }
  .spinner {
    width:36px; height:36px; margin:0 auto 14px;
    border:3px solid rgba(255,255,255,0.1);
    border-top-color:var(--pink);
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Winner */
  .overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.88); z-index:100;
    flex-direction:column; align-items:center; justify-content:center; padding:24px;
  }
  .overlay.show { display:flex; }
  .winner-card {
    background:linear-gradient(145deg,#1B3A6B,#0D1B35);
    border:3px solid var(--pink); border-radius:24px;
    padding:36px 28px; text-align:center;
    max-width:340px; width:100%;
    box-shadow:0 0 60px rgba(216,27,126,0.5);
    animation:pop .45s cubic-bezier(.175,.885,.32,1.275);
  }
  @keyframes pop { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
  .w-trophy  { font-size:60px; margin-bottom:10px; }
  .w-label   { font-size:11px; font-weight:800; letter-spacing:3px; color:var(--pink); text-transform:uppercase; margin-bottom:8px; }
  .w-name    { font-size:30px; font-weight:900; line-height:1.2; margin-bottom:6px; }
  .w-detail  { font-size:13px; color:rgba(255,255,255,0.55); margin-bottom:24px; }
  .w-close   {
    width:100%; padding:14px; background:var(--pink);
    border:none; border-radius:30px; color:white;
    font-size:15px; font-weight:800; cursor:pointer;
  }

  /* Confetti */
  .conf {
    position:fixed; pointer-events:none; z-index:200;
    animation:fall linear forwards;
  }
  @keyframes fall {
    0%   { transform:translateY(-20px) rotate(0deg);   opacity:1; }
    100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
  }

  .footer { margin:16px auto 28px; font-size:11px; color:rgba(255,255,255,0.22); text-align:center; padding:0 20px; line-height:1.6; }
</style>
</head>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1Z2WAHXzfOU5VFHYT59ZNta2kKxEea94rxKTeVvo552U/gviz/tq?tqx=out:csv&t=";
const COLORS  = ['#D81B7E','#1B3A6B','#A0155E','#2A5298','#E83A95','#3B6CC7',
                  '#F5C842','#C2185B','#4472CA','#E91E8C','#1565C0','#FF6090',
                  '#0D47A1','#F48FB1','#42A5F5'];

let parts = [], isSpinning = false, angle = 0;
let recorder = null, chunks = [], recOn = false, stream = null;

// ── Date ─────────────────────────────────────────────────
const now = new Date();
document.getElementById('dateEl').textContent =
  now.toLocaleDateString('fr-FR', {day:'2-digit', month:'long', year:'numeric'});

const todayPrefix = [
  String(now.getDate()).padStart(2,'0'),
  String(now.getMonth()+1).padStart(2,'0'),
  now.getFullYear()
].join('/');

// ── CSV parser ────────────────────────────────────────────
function parseCSV(txt) {
  const lines = txt.trim().split('\n');
  const out   = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitLine(lines[i]);
    const horo = (cols[0]||'').replace(/"/g,'').trim();
    if (!horo.startsWith(todayPrefix)) continue;
    const nom    = (cols[1]||'').replace(/"/g,'').trim();
    const prenom = (cols[2]||'').replace(/"/g,'').trim();
    const email  = (cols[3]||'').replace(/"/g,'').trim();
    const tel    = (cols[5]||'').replace(/"/g,'').trim();
    if (!nom && !prenom) continue;
    out.push({ nom, prenom, email, tel });
  }
  return out;
}

function splitLine(line) {
  const r = []; let cur = '', q = false;
  for (const c of line) {
    if (c==='"') { q=!q; continue; }
    if (c===',' && !q) { r.push(cur); cur=''; continue; }
    cur += c;
  }
  r.push(cur); return r;
}

// ── Load ─────────────────────────────────────────────────
async function load() {
  setState('loading');
  document.getElementById('cnt').textContent = '—';
  document.getElementById('wheelWrap').style.display = 'none';
  try {
    const r = await fetch(CSV_URL + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const txt = await r.text();
    parts = parseCSV(txt);
    document.getElementById('cnt').textContent = parts.length;
    if (parts.length === 0) {
      setState('empty');
    } else {
      setState('');
      document.getElementById('wheelWrap').style.display = 'block';
      draw(angle);
    }
  } catch(e) {
    setState('error', e.message);
    console.error(e);
  }
}

function setState(type, msg='') {
  const el = document.getElementById('stateEl');
  if (type === 'loading') {
    el.style.display = 'block';
    el.className = 'state';
    el.innerHTML = '<div class="spinner"></div>Chargement des participantes...';
  } else if (type === 'empty') {
    el.style.display = 'block';
    el.className = 'state';
    el.innerHTML = '<div class="icon">🎯</div>Aucune inscription aujourd'hui encore.<br>La roue se mettra à jour automatiquement.';
  } else if (type === 'error') {
    el.style.display = 'block';
    el.className = 'state err';
    el.innerHTML = '<div class="icon">⚠️</div>Erreur de chargement :<br><small>' + msg + '</small>';
  } else {
    el.style.display = 'none';
  }
}

// ── Canvas ────────────────────────────────────────────────
const cv  = document.getElementById('wCanvas');
const ctx = cv.getContext('2d');
const SZ = 760, CX = 380, CY = 380, R = 368;

function draw(a) {
  if (!parts.length) return;
  ctx.clearRect(0,0,SZ,SZ);
  const arc = 2*Math.PI / parts.length;

  parts.forEach((p,i) => {
    const a0=a+i*arc, a1=a0+arc;
    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,R,a0,a1); ctx.closePath();
    ctx.fillStyle=COLORS[i%COLORS.length]; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1.5; ctx.stroke();

    ctx.save(); ctx.translate(CX,CY); ctx.rotate(a0+arc/2);
    const lim = parts.length<=10?14:parts.length<=20?10:7;
    const fs  = parts.length<=8?22:parts.length<=16?17:parts.length<=30?13:10;
    const lbl = (p.prenom+' '+p.nom).slice(0,lim);
    ctx.font=`bold ${fs}px -apple-system,Arial,sans-serif`;
    ctx.textAlign='right'; ctx.fillStyle='white';
    ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=3;
    ctx.fillText(lbl, R-14, fs/3);
    ctx.restore();
  });

  // Centre
  ctx.beginPath(); ctx.arc(CX,CY,74,0,2*Math.PI);
  ctx.fillStyle='#0D1B35'; ctx.fill();
  ctx.strokeStyle='#D81B7E'; ctx.lineWidth=4.5; ctx.stroke();
  if (window._logo?.complete) {
    ctx.save(); ctx.beginPath(); ctx.arc(CX,CY,68,0,2*Math.PI); ctx.clip();
    ctx.drawImage(window._logo,CX-68,CY-68,136,136); ctx.restore();
  }
  // Bordure
  ctx.beginPath(); ctx.arc(CX,CY,R,0,2*Math.PI);
  ctx.strokeStyle='#D81B7E'; ctx.lineWidth=6; ctx.stroke();
}

// ── Spin ─────────────────────────────────────────────────
function spin() {
  if (isSpinning || !parts.length) return;
  isSpinning = true;
  document.getElementById('btnSpin').disabled = true;

  const tours  = 7 + Math.random()*5;
  const target = angle + tours * 2*Math.PI;
  const dur    = 4500 + Math.random()*2000;
  const t0 = performance.now(), from = angle;
  const ease = t => 1 - Math.pow(1-t, 4);

  (function frame(now) {
    const t = Math.min((now-t0)/dur, 1);
    angle = from + (target-from)*ease(t);
    draw(angle);
    if (t < 1) requestAnimationFrame(frame);
    else {
      angle = ((angle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      isSpinning = false;
      document.getElementById('btnSpin').disabled = false;
      showWinner();
    }
  })(performance.now());
}

// ── Winner ────────────────────────────────────────────────
function showWinner() {
  const arc = 2*Math.PI/parts.length;
  const idx = Math.floor(((2*Math.PI-angle)%(2*Math.PI))/arc) % parts.length;
  const w   = parts[idx];
  document.getElementById('wName').textContent   = w.prenom + ' ' + w.nom;
  document.getElementById('wDetail').textContent = w.email || w.tel || '';
  document.getElementById('overlay').classList.add('show');
  confetti();
}

function closeWinner() {
  document.getElementById('overlay').classList.remove('show');
}

function confetti() {
  const C=['#D81B7E','#F5C842','#FFF','#42A5F5','#E83A95','#FFD700','#1B3A6B'];
  for(let i=0;i<90;i++) {
    const el=document.createElement('div');
    el.className='conf';
    const s=6+Math.random()*8;
    el.style.cssText=`left:${Math.random()*100}vw;top:-12px;width:${s}px;height:${s}px;background:${C[i%C.length]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*.6}s`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

// ── Recording ────────────────────────────────────────────
async function toggleRec() {
  const btn = document.getElementById('btnRec');
  if (!recOn) {
    stream  = cv.captureStream(30);
    chunks  = [];
    const mime = ['video/webm;codecs=vp9','video/webm','video/mp4'].find(m=>MediaRecorder.isTypeSupported(m))||'';
    recorder = new MediaRecorder(stream, mime?{mimeType:mime}:{});
    recorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
    recorder.onstop = () => {
      const blob = new Blob(chunks,{type:chunks[0]?.type||'video/webm'});
      const a    = Object.assign(document.createElement('a'),{
        href: URL.createObjectURL(blob),
        download: `femina-tirage-${now.toISOString().slice(0,10)}.webm`
      });
      a.click();
    };
    recorder.start(100);
    recOn=true;
    btn.textContent='⏹  Arrêter et télécharger';
    btn.classList.add('on');
  } else {
    recorder.stop();
    stream.getTracks().forEach(t=>t.stop());
    recOn=false;
    btn.textContent='⏺  Enregistrer la vidéo';
    btn.classList.remove('on');
  }
}

// ── Init ─────────────────────────────────────────────────
load();
setInterval(load, 60000);
